<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#eee8d8" />
    <meta name="description" content="BRIGHTomorrow 中文 Zine" />
    <title>BRIGHTomorrow — 中文 Zine</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="zine-shell">
      <div class="paper-noise" aria-hidden="true"></div>

      <header class="site-header">
        <a class="wordmark" href="#top" aria-label="BRIGHTomorrow 首页">
          <span>BRIGHT</span>omorrow
        </a>
        <div class="issue-lockup" aria-label="第一期，2026 年">
          <span>VOL.01</span><i></i><span>2026</span>
        </div>
        <a class="article-jump" href="#articles">
          <span>ARTICLES</span><span class="jump-icon" aria-hidden="true">↓</span>
        </a>
      </header>

      <main id="top">
        <section class="front-matter" aria-labelledby="issue-heading">
          <div class="front-label"><span>ISSUE</span><b>01</b></div>
          <h1 id="issue-heading" aria-label="BRIGHTomorrow 第一期文章">
            <span>ARTI</span><span class="offset-word">CLES</span>
          </h1>
          <div class="front-code" aria-hidden="true">
            <span>BT—01</span><span>35°41′N</span><span>2026</span>
          </div>
          <div class="front-bars" aria-hidden="true">
            <span></span><span></span><span></span><span></span><span></span><span></span>
          </div>
          <span class="registration-mark" aria-hidden="true"></span>
        </section>

        <section class="article-grid" id="articles" aria-label="文章"></section>
        <section class="story-slots" id="story-slots" aria-label="文章内容区"></section>
      </main>

      <footer class="site-footer">
        <span>BRIGHTomorrow</span><span>VOL.01 / 2026</span><a href="#top">TOP ↑</a>
      </footer>
    </div>
    <script src="app.js" defer></script>
  </body>
</html>
